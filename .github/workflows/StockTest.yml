name: 🚑 Run Debug StockTest (Manual)

on: workflow_dispatch

jobs:
  debug-run:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4 # v4 하나로 통합

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade openai
        pip install gspread gspread-formatting google-auth pandas
        pip install gspread-dataframe   # ✅ 이 줄 추가 (핵심)
        # 1. 모든 필요 라이브러리를 한 번에 설치 (scipy 포함)
        pip install -U finance-datareader yfinance pykrx pandas numpy scipy requests mplfinance gspread gspread-formatting oauth2client pytz ta

    - name: Run Debug Script
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        GOOGLE_JSON_KEY: ${{ secrets.GOOGLE_JSON_KEY }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: python Stock_test4.py
