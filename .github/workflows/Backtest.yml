name: 백테스트 (주식스캐너 + 종가배팅)

on:
  workflow_dispatch:
    inputs:
      backtest_type:
        description: '백테스트 종류'
        required: true
        default: 'closing_bet'
        type: choice
        options:
          - closing_bet
          - main_scanner

      mode:
        description: '종가배팅 실행 모드'
        required: true
        default: 'performance'
        type: choice
        options:
          - performance
          - replay

      start_date:
        description: '시작일 (예: 2026-03-05)'
        required: true
        default: '2026-03-05'
        type: string

      end_date:
        description: '종료일 (비우면 오늘 날짜 사용, 예: 2026-04-03)'
        required: false
        default: ''
        type: string

      top_n:
        description: '분석 종목 수'
        required: false
        default: '2000'
        type: string

      flow_filter:
        description: '수급 필터'
        required: true
        default: 'off'
        type: choice
        options:
          - off
          - soft
          - strict

      ai_backfill:
        description: 'AI 백필'
        required: true
        default: 'off'
        type: choice
        options:
          - off
          - missing
          - all

      ai_backfill_per_day:
        description: '일자별 AI 백필 개수'
        required: false
        default: '7'
        type: string

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: |
          pip install --upgrade pip
          pip install pandas numpy yfinance pykrx finance-datareader beautifulsoup4 requests mplfinance ta openai anthropic gspread oauth2client scipy feedparser google-generativeai

      - name: 실행 변수 준비
        id: prep
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.end_date }}" ]; then
            END_DATE="${{ github.event.inputs.end_date }}"
          else
            END_DATE="$(date +%F)"
          fi

          echo "END_DATE=$END_DATE" >> $GITHUB_ENV
          echo "선택된 종료일: $END_DATE"

      - name: 종가배팅 백테스트
        if: ${{ github.event.inputs.backtest_type == 'closing_bet' }}
        env:
          GOOGLE_JSON_KEY: ${{ secrets.GOOGLE_JSON_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python Closing_bet_backtest.py \
            --start "${{ github.event.inputs.start_date }}" \
            --end "$END_DATE" \
            --top "${{ github.event.inputs.top_n }}" \
            --mode "${{ github.event.inputs.mode }}" \
            --flow-filter "${{ github.event.inputs.flow_filter }}" \
            --ai-backfill "${{ github.event.inputs.ai_backfill }}" \
            --ai-backfill-per-day "${{ github.event.inputs.ai_backfill_per_day }}"

      - name: 메인 스캐너 백테스트
        if: ${{ github.event.inputs.backtest_type == 'main_scanner' }}
        env:
          GOOGLE_JSON_KEY: ${{ secrets.GOOGLE_JSON_KEY }}
        run: |
          python nextrade_backtest.py \
            --start "${{ github.event.inputs.start_date }}" \
            --end "$END_DATE" \
            --top "${{ github.event.inputs.top_n }}"

      - name: 결과 파일 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backtest-result
          path: |
            *.csv
            *.log