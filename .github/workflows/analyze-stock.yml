name: Analyze Single Stock

on:
  workflow_dispatch:
    inputs:
      stock_code:
        description: "종목코드 (예: 005930)"
        required: true
        default: "005930"
        type: string
      stock_name:
        description: "종목명 (선택)"
        required: false
        default: ""
        type: string
      mode:
        description: "패턴 모드"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - closing_bet
          - envelope_bet
          - dolbanji
          - watermelon
          - viper
          - yeokmae
          - double_bottom
      force:
        description: "장중 시간 제한 무시"
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      TZ: Asia/Seoul

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 📦 의존성 설치
        run: |
          pip install --upgrade pip
          pip install pandas numpy yfinance pykrx finance-datareader beautifulsoup4 requests mplfinance ta openai anthropic gspread oauth2client scipy feedparser \

      - name: Create output directories
        run: |
          mkdir -p site reports

      - name: Run analyzer
        run: |
          python analyze_single_stock.py \
            --code "${{ inputs.stock_code }}" \
            --name "${{ inputs.stock_name }}" \
            --mode "${{ inputs.mode }}" \
            ${{ inputs.force && '--force' || '' }} \
            --output-json reports/latest_result.json \
            --output-html site/index.html

      - name: Upload result artifact
        uses: actions/upload-artifact@v4
        with:
          name: stock-analysis-report-${{ inputs.stock_code }}
          path: |
            reports/latest_result.json
            site/index.html
          retention-days: 7

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4