name: Analyze Single Stock Twotrack AI

on:
  workflow_dispatch:
    inputs:
      stock_query:
        description: "종목코드 또는 종목명 (예: 005930 또는 삼성전자)"
        required: true
        default: "삼성전자"
        type: string
      stock_name:
        description: "종목명 힌트 (선택)"
        required: false
        default: ""
        type: string
      mode:
        description: "패턴 모드"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - closing_bet
          - envelope_bet
          - dolbanji
          - watermelon
          - viper
          - yeokmae
          - double_bottom
          - pre_dolbanji
          - pre_dolbanji_lite
          - pre_dolbanji_hts_exact
      days:
        description: "계산용 과거 데이터 조회 일수"
        required: true
        default: "900"
        type: string
      start_date:
        description: "결과를 보고 싶은 시작일 YYYY-MM-DD (선택)"
        required: false
        default: ""
        type: string
      end_date:
        description: "결과를 보고 싶은 기준일 YYYY-MM-DD (선택)"
        required: false
        default: ""
        type: string
      min_bars:
        description: "최소 거래봉 수"
        required: true
        default: "40"
        type: string
      force:
        description: "장중 시간 제한 무시"
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-analyze-single-stock-twotrack-ai"
  cancel-in-progress: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      TZ: Asia/Seoul
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy pytz pykrx finance-datareader lxml html5lib requests openai

      - name: Validate optional dates
        shell: bash
        run: |
          if [[ -n "${{ inputs.start_date }}" ]] && ! [[ "${{ inputs.start_date }}" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
            echo "start_date 형식이 잘못되었습니다. YYYY-MM-DD 형식으로 입력하세요."
            exit 1
          fi
          if [[ -n "${{ inputs.end_date }}" ]] && ! [[ "${{ inputs.end_date }}" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
            echo "end_date 형식이 잘못되었습니다. YYYY-MM-DD 형식으로 입력하세요."
            exit 1
          fi
          if [[ -n "${{ inputs.start_date }}" && -n "${{ inputs.end_date }}" ]]; then
            if [[ "${{ inputs.start_date }}" > "${{ inputs.end_date }}" ]]; then
              echo "start_date는 end_date보다 늦을 수 없습니다."
              exit 1
            fi
          fi

      - name: Run analyzer
        shell: bash
        run: |
          args=(python analyze_single_stock.py             --code "${{ inputs.stock_query }}"             --name "${{ inputs.stock_name }}"             --mode "${{ inputs.mode }}"             --days "${{ inputs.days }}"             --min-bars "${{ inputs.min_bars }}"             --output-json reports/latest_result.json             --output-html site/index.html)
          if [[ "${{ inputs.force }}" == "true" ]]; then args+=(--force); fi
          if [[ -n "${{ inputs.start_date }}" ]]; then args+=(--start-date "${{ inputs.start_date }}"); fi
          if [[ -n "${{ inputs.end_date }}" ]]; then args+=(--end-date "${{ inputs.end_date }}"); fi

          mkdir -p site reports
          printf 'Running: %q ' "${args[@]}"
          echo
          "${args[@]}"

      - name: Upload result artifact
        uses: actions/upload-artifact@v4
        with:
          name: stock-analysis-report
          path: |
            reports/latest_result.json
            site/index.html
          retention-days: 7

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
