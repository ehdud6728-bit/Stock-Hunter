name: Analyze Single Stock

on:
  workflow_dispatch:
    inputs:
      stock_code:
        description: "종목코드 (예: 005930)"
        required: true
        default: "005930"
        type: string
      stock_name:
        description: "종목명 (선택)"
        required: false
        default: ""
        type: string
      mode:
        description: "패턴 모드"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - closing_bet
          - envelope_bet
          - dolbanji
          - watermelon
          - viper
          - yeokmae
          - double_bottom
      force:
        description: "장중 시간 제한 무시"
        required: true
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy requests FinanceDataReader pykrx beautifulsoup4 lxml pytz

      - name: Create output directories
        run: |
          mkdir -p site reports

      - name: Run analyzer
        run: |
          python analyze_single_stock.py \
            --code "${{ inputs.stock_code }}" \
            --name "${{ inputs.stock_name }}" \
            --mode "${{ inputs.mode }}" \
            ${{ inputs.force && '--force' || '' }} \
            --output-json reports/latest_result.json \
            --output-html site/index.html

      - name: Upload result artifact
        uses: actions/upload-artifact@v4
        with:
          name: stock-analysis-report-${{ inputs.stock_code }}
          path: |
            reports/latest_result.json
            site/index.html
          retention-days: 7