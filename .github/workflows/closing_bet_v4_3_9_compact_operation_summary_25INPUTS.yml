name: closing-bet-v4-3-9-compact-operation-summary

on:
  workflow_dispatch:
    inputs:
      action_mode:
        description: 실행 모드
        required: true
        default: backtest__성과검증
        type: choice
        options:
          - backtest__성과검증
          - live__실시간스캔
          - eval__미평가후보_평가
          - summary__검증요약
      strategy_only:
        description: 전략 선택
        required: true
        default: none__전체/일반실행
        type: choice
        options:
          - none__전체/일반실행
          - i_core__I-MAIN_150/200일_시세분출
          - leader_gap__L-CORE_대형주_리더갭
          - h_watch__H-WATCH_신고가_눌림관찰
          - h__H-CORE_신고가거자름
          - g__G-SAFE_모랄레스갭
          - c_pullback__C_역매공파_눌림재진입
          - c_strict__C_역매공파_엄격형
          - c_swing__C_역매공파_스윙
          - c__C_역매공파_전체
          - safe__S-CORE_SAFE
          - neutral__S-CORE_NEUTRAL
          - risk__S-CORE_RISK
          - core__S-CORE_전체
      backtest_months:
        description: 백테스트 개월수, weeks/start/end 미사용 시 적용
        required: true
        default: '18'
      backtest_weeks:
        description: 백테스트 주수, 0이면 미사용
        required: true
        default: '0'
      backtest_start:
        description: 시작일 YYYY-MM-DD, 비우면 자동
        required: false
        default: ''
      backtest_end:
        description: 종료일 YYYY-MM-DD, 비우면 자동
        required: false
        default: ''
      hold_days:
        description: 보유평가 거래일수
        required: true
        default: '60'
      top_per_strategy:
        description: 날짜별 전략별 TOP N
        required: true
        default: '5'
      all_candidates:
        description: 전체후보 검증 여부
        required: true
        default: 'true'
        type: choice
        options: ['true', 'false']
      send_telegram:
        description: 텔레그램 전송 여부
        required: true
        default: 'true'
        type: choice
        options: ['true', 'false']
      compact_summary:
        description: v4.3.9 압축요약 사용
        required: true
        default: 'true'
        type: choice
        options: ['true', 'false']
      i_core_main_only:
        description: I-MAIN은 MAIN 후보만 압축검증
        required: true
        default: 'true'
        type: choice
        options: ['true', 'false']
      detail_top_n:
        description: I-MAIN 샘플 표시 개수
        required: true
        default: '5'
      stock_feature_min_n:
        description: 종목특성 통계 최소 표본수
        required: true
        default: '5'
      show_full_i_core_report:
        description: I-CORE 전체 원문 리포트 표시
        required: true
        default: 'false'
        type: choice
        options: ['true', 'false']
      show_full_stock_feature_report:
        description: 종목특성 전체 원문 리포트 표시
        required: true
        default: 'false'
        type: choice
        options: ['true', 'false']
      show_broad_diag:
        description: A/B/C/H 넓은 진단 원문 표시
        required: true
        default: 'false'
        type: choice
        options: ['true', 'false']
      scan_universe:
        description: 스캔 유니버스
        required: true
        default: hybrid_union
        type: choice
        options:
          - hybrid_union
          - kospi200+kosdaq150
          - amount_top400
          - kospi200
          - hybrid_intersection
      max_workers:
        description: 실시간 스캔 워커수
        required: true
        default: '12'
      backtest_workers:
        description: 백테스트 워커수
        required: true
        default: '8'
      force:
        description: 시간 무관 강제 실행
        required: true
        default: 'true'
        type: choice
        options: ['true', 'false']
      debug:
        description: 백테스트 진단 로그 포함
        required: true
        default: 'false'
        type: choice
        options: ['true', 'false']

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      TZ: Asia/Seoul
      PYTHONUNBUFFERED: '1'
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      CLOSING_BET_TOKEN: ${{ secrets.CLOSING_BET_TOKEN }}
      CLOSING_BET_CHAT_ID: ${{ secrets.CLOSING_BET_CHAT_ID }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      DART_API_KEY: ${{ secrets.DART_API_KEY }}
      KRX_DATA_ID: ${{ secrets.KRX_DATA_ID }}
      KRX_DATA_PW: ${{ secrets.KRX_DATA_PW }}

      CLOSING_BET_COMPACT_OPERATION_SUMMARY: ${{ inputs.compact_summary == 'true' && '1' || '0' }}
      CLOSING_BET_COMPACT_I_MAIN_SAMPLE_TOP_N: ${{ inputs.detail_top_n }}
      CLOSING_BET_BACKTEST_DETAIL_TOP_N: ${{ inputs.detail_top_n }}
      CLOSING_BET_STOCK_FEATURE_MIN_N: ${{ inputs.stock_feature_min_n }}
      CLOSING_BET_SHOW_FULL_I_CORE_REPORT: ${{ inputs.show_full_i_core_report == 'true' && '1' || '0' }}
      CLOSING_BET_SHOW_FULL_STOCK_FEATURE_REPORT: ${{ inputs.show_full_stock_feature_report == 'true' && '1' || '0' }}
      CLOSING_BET_SHOW_FULL_BROAD_DIAG: ${{ inputs.show_broad_diag == 'true' && '1' || '0' }}
      CLOSING_BET_SHOW_LEGACY_SECTIONS: ${{ inputs.show_broad_diag == 'true' && '1' || '0' }}
      CLOSING_BET_SHOW_RISK_DETAILS: ${{ inputs.show_broad_diag == 'true' && '1' || '0' }}
      CLOSING_BET_SHOW_C_DIAG: ${{ inputs.show_broad_diag == 'true' && '1' || '0' }}
      CLOSING_BET_SHOW_H_DIAG: ${{ inputs.show_broad_diag == 'true' && '1' || '0' }}
      I_CORE_MAIN_ONLY: ${{ inputs.i_core_main_only == 'true' && '1' || '0' }}
      CLOSING_BET_MAX_WORKERS: ${{ inputs.max_workers }}
      CLOSING_BET_BACKTEST_WORKERS: ${{ inputs.backtest_workers }}
      CLOSING_BET_LOG_DIR: closing_bet_logs
      CLOSING_BET_SCAN_UNIVERSE: ${{ inputs.scan_universe }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install pandas numpy requests FinanceDataReader pykrx beautifulsoup4 lxml pytz python-dateutil openpyxl
          fi

      - name: Show v4.3.9 files
        run: |
          echo "Python file check"
          ls -la Closing_bet_scanner_v4_3_9_COMPACT_OPERATION_SUMMARY_complete.py || true
          ls -la Closing_bet_scanner_v4_3_8_STOCK_FEATURE_RISK_ANALYSIS_complete.py || true
          ls -la Closing_bet_scanner_v2.py || true

      - name: Run compact scanner/backtest
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p closing_bet_logs

          ACTION_RAW="${{ inputs.action_mode }}"
          ACTION="${ACTION_RAW%%__*}"
          STRATEGY_RAW="${{ inputs.strategy_only }}"
          STRATEGY="${STRATEGY_RAW%%__*}"

          FLAGS=""
          if [ "${{ inputs.force }}" = "true" ]; then
            FLAGS="$FLAGS --force"
          fi

          STRAT_FLAGS=""
          case "$STRATEGY" in
            none) STRAT_FLAGS="" ;;
            i_core) STRAT_FLAGS="--backtest-i-core-only" ;;
            leader_gap) STRAT_FLAGS="--backtest-leader-gap-only" ;;
            h_watch) STRAT_FLAGS="--backtest-h-watch-only" ;;
            h) STRAT_FLAGS="--backtest-h-only" ;;
            g) STRAT_FLAGS="--backtest-g-only" ;;
            c_pullback) STRAT_FLAGS="--backtest-c-pullback-only" ;;
            c_strict) STRAT_FLAGS="--backtest-c-strict-only" ;;
            c_swing) STRAT_FLAGS="--backtest-c-swing-only" ;;
            c) STRAT_FLAGS="--backtest-c-only" ;;
            safe) STRAT_FLAGS="--backtest-safe-only" ;;
            neutral) STRAT_FLAGS="--backtest-neutral-only" ;;
            risk) STRAT_FLAGS="--backtest-risk-only" ;;
            core) STRAT_FLAGS="--backtest-core-only" ;;
            *) STRAT_FLAGS="" ;;
          esac

          if [ "$ACTION" = "backtest" ]; then
            BT_FLAGS="--backtest-hold-days ${{ inputs.hold_days }} --backtest-top-per-strategy ${{ inputs.top_per_strategy }} $STRAT_FLAGS"
            if [ "${{ inputs.backtest_weeks }}" != "0" ]; then
              BT_FLAGS="$BT_FLAGS --backtest-weeks ${{ inputs.backtest_weeks }}"
            elif [ -n "${{ inputs.backtest_start }}" ] || [ -n "${{ inputs.backtest_end }}" ]; then
              [ -n "${{ inputs.backtest_start }}" ] && BT_FLAGS="$BT_FLAGS --backtest-start ${{ inputs.backtest_start }}"
              [ -n "${{ inputs.backtest_end }}" ] && BT_FLAGS="$BT_FLAGS --backtest-end ${{ inputs.backtest_end }}"
            else
              BT_FLAGS="$BT_FLAGS --backtest-months ${{ inputs.backtest_months }}"
            fi
            if [ "${{ inputs.all_candidates }}" = "true" ]; then
              BT_FLAGS="$BT_FLAGS --backtest-all-candidates"
            fi
            if [ "${{ inputs.debug }}" = "true" ]; then
              BT_FLAGS="$BT_FLAGS --backtest-debug"
            fi
            if [ "${{ inputs.send_telegram }}" = "true" ]; then
              BT_FLAGS="$BT_FLAGS --send-backtest-summary"
            fi
            echo "RUN: python Closing_bet_scanner_v4_3_9_COMPACT_OPERATION_SUMMARY_complete.py $BT_FLAGS $FLAGS"
            python Closing_bet_scanner_v4_3_9_COMPACT_OPERATION_SUMMARY_complete.py $BT_FLAGS $FLAGS
          elif [ "$ACTION" = "eval" ]; then
            EXTRA="--eval-pending"
            if [ "${{ inputs.send_telegram }}" = "true" ]; then EXTRA="$EXTRA --send-summary"; fi
            python Closing_bet_scanner_v4_3_9_COMPACT_OPERATION_SUMMARY_complete.py $EXTRA $FLAGS
          elif [ "$ACTION" = "summary" ]; then
            EXTRA="--summary"
            if [ "${{ inputs.send_telegram }}" = "true" ]; then EXTRA="$EXTRA --send-summary"; fi
            python Closing_bet_scanner_v4_3_9_COMPACT_OPERATION_SUMMARY_complete.py $EXTRA $FLAGS
          else
            python Closing_bet_scanner_v4_3_9_COMPACT_OPERATION_SUMMARY_complete.py $FLAGS
          fi

      - name: Upload closing-bet artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: closing-bet-v4-3-9-compact-logs
          path: |
            closing_bet_logs/**
            *.csv
            *.txt
            *.html
          if-no-files-found: ignore
