name: Run Main Scanner

on:
  workflow_dispatch:
    inputs:
      test_mode:
        description: "테스트 채널로 전송"
        required: true
        default: false
        type: boolean
      test_chat_id_override:
        description: "테스트 채널 ID 직접 입력 (선택)"
        required: false
        default: ""
        type: string

jobs:
  run-scanner:
    runs-on: ubuntu-latest

    env:
      TZ: Asia/Seoul

      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_TEST_CHAT_ID: ${{ secrets.TELEGRAM_TEST_CHAT_ID }}

      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      DART_API_KEY: ${{ secrets.DART_API_KEY }}

      TEST_MODE: ${{ inputs.test_mode }}
      TELEGRAM_CHAT_ID_EFFECTIVE: ${{ inputs.test_chat_id_override }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy requests FinanceDataReader pykrx beautifulsoup4 mplfinance matplotlib openai anthropic gspread oauth2client scipy feedparser

      - name: Show run mode
        run: |
          echo "TEST_MODE=${TEST_MODE}"
          echo "TELEGRAM_CHAT_ID_EFFECTIVE=${TELEGRAM_CHAT_ID_EFFECTIVE}"

      - name: Run scanner
        run: |
          python main7_bugfix_2.py
