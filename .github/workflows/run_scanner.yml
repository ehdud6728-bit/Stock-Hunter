name: Run Main Scanner V1107.4.5.29 Empty Payload Root Trace

on:
  schedule:
    # 한국시간 평일 오전 8:37 = UTC 전날 23:37, 일~목
    - cron: '37 23 * * 0-4'
    # 한국시간 평일 오후 2:37 = UTC 05:37, 월~금
    - cron: '37 05 * * 1-5'
    # 한국시간 평일 오후 3:07 = UTC 06:07, 월~금
    - cron: '07 06 * * 1-5'
  workflow_dispatch:
    inputs:
      run_profile:
        description: "실행 프로필 선택"
        required: true
        default: TEST_FAST
        type: choice
        options:
          - REAL_FULL
          - TEST_FULL
          - TEST_FAST
          - WEEKLY_BACKTEST
      backtest_source:
        description: "성과검증 방식 선택"
        required: false
        default: DIRECT_REPLAY
        type: choice
        options:
          - DIRECT_REPLAY
          - CSV_CACHE
      direct_top_n:
        description: "직접 재현검증 universe 크기"
        required: false
        default: "150"
        type: string
      direct_limit_per_date:
        description: "직접 재현검증 기준일별 TOP 후보 수"
        required: false
        default: "15"
        type: string
      test_chat_id_override:
        description: "테스트 채널 ID 직접 입력 (선택)"
        required: false
        default: "8325973023"
        type: string
      backtest_weeks:
        description: "V1080 성과검증 주차 수"
        required: false
        default: "8"
        type: string
      backtest_hold_days:
        description: "성과검증 보유 평가일(추천 10: 1/3/5/10일 분석)"
        required: false
        default: "10"
        type: string
      backtest_stop_pct:
        description: "고정 손절 기준(%), fallback 또는 비교용"
        required: false
        default: "-5"
        type: string
      backtest_stop_mode:
        description: "V1082 성과검증 손절 기준 선택"
        required: false
        default: SIGNAL_STOP_WITH_FALLBACK
        type: choice
        options:
          - FIXED_PCT
          - SIGNAL_STOP
          - SIGNAL_STOP_WITH_FALLBACK
          - BOTH_COMPARE
      signal_csv_path:
        description: "V1080 신호 누적 CSV 경로"
        required: false
        default: "reports/v1080_stockhunter_signals.csv"
        type: string
      backtest_output_mode:
        description: "V1080 성과검증 결과 출력 방식"
        required: false
        default: BOTH
        type: choice
        options:
          - FILE
          - TELEGRAM
          - BOTH

permissions:
  contents: read
  pages: write
  id-token: write

