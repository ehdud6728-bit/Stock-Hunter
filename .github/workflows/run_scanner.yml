name: Run Main Scanner

on:
  schedule:
    # 한국시간 평일 오전 8:30
    # = UTC 전날 23:30
    # 일~목 UTC 23:30 -> 월~금 KST 08:30
    - cron: '52 21 * * 0-4'

    # 한국시간 평일 오후 3:30
    # = UTC 06:30
    # 월~금 UTC 06:30 -> 월~금 KST 15:30
    - cron: '52 05 * * 1-5'

  workflow_dispatch:
    inputs:
      test_mode:
        description: "테스트 채널로 전송"
        required: true
        default: false
        type: boolean
      test_chat_id_override:
        description: "테스트 채널 ID 직접 입력 (선택)"
        required: false
        default: "8325973023"
        type: string

jobs:
  run-scanner:
    runs-on: ubuntu-latest

    env:
      TZ: Asia/Seoul

      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_TEST_CHAT_ID: ${{ secrets.TELEGRAM_TEST_CHAT_ID }}

      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      DART_API_KEY: ${{ secrets.DART_API_KEY }}
      GOOGLE_JSON_KEY: ${{ secrets.GOOGLE_JSON_KEY }}

      TEST_MODE: ${{ inputs.test_mode }}
      TELEGRAM_CHAT_ID_EFFECTIVE: ${{ inputs.test_chat_id_override }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          pip install pandas
          pip install requests beautifulsoup4 pytz scipy ta
          pip install finance-datareader pykrx mplfinance
          pip install openai google-generativeai
          pip install gspread gspread-formatting gspread-dataframe google-auth oauth2client
          pip install -r requirements.txt

      - name: Show run mode
        run: |
          echo "TEST_MODE=${TEST_MODE}"
          echo "TELEGRAM_CHAT_ID_EFFECTIVE=${TELEGRAM_CHAT_ID_EFFECTIVE}"

      - name: Run scanner
        run: |
          python main7_bugfix_2.py
