      - name: Schedule proof / trigger diagnostics
        if: always()
        shell: bash
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🧭 [V1107.4.5.26 SCHEDULE PROOF]"
          echo "GITHUB_EVENT_NAME=${GITHUB_EVENT_NAME}"
          echo "GITHUB_REF=${GITHUB_REF}"
          echo "GITHUB_SHA=${GITHUB_SHA}"
          echo "GITHUB_EVENT_SCHEDULE=${{ github.event.schedule }}"
          echo "GITHUB_EVENT_SCHEDULE=${{ github.event.schedule }}" >> $GITHUB_ENV
          echo "NOW_UTC=$(date -u '+%Y-%m-%d %H:%M:%S %Z')"
          echo "NOW_KST=$(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M:%S %Z')"
          echo "SCHEDULE_EXPECTED_KST=08:37 / 14:37 / 15:07 weekdays"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Resolve run profile
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PROFILE="${{ inputs.run_profile }}"
            TEST_CHAT_OVERRIDE="${{ inputs.test_chat_id_override }}"
            BACKTEST_SOURCE="${{ inputs.backtest_source }}"
            DIRECT_TOP_N="${{ inputs.direct_top_n }}"
            DIRECT_LIMIT_PER_DATE="${{ inputs.direct_limit_per_date }}"
            BACKTEST_WEEKS="${{ inputs.backtest_weeks }}"
            BACKTEST_HOLD_DAYS="${{ inputs.backtest_hold_days }}"
            BACKTEST_STOP_PCT="${{ inputs.backtest_stop_pct }}"
            BACKTEST_STOP_MODE="${{ inputs.backtest_stop_mode }}"
            SIGNAL_CSV_PATH="${{ inputs.signal_csv_path }}"
            BACKTEST_OUTPUT_MODE="${{ inputs.backtest_output_mode }}"
          else
            PROFILE="REAL_FULL"
            TEST_CHAT_OVERRIDE=""
            BACKTEST_SOURCE="DIRECT_REPLAY"
            DIRECT_TOP_N="150"
            DIRECT_LIMIT_PER_DATE="15"
            BACKTEST_WEEKS="8"
            BACKTEST_HOLD_DAYS="10"
            BACKTEST_STOP_PCT="-5"
            BACKTEST_STOP_MODE="SIGNAL_STOP_WITH_FALLBACK"
            SIGNAL_CSV_PATH="reports/v1080_stockhunter_signals.csv"
            BACKTEST_OUTPUT_MODE="BOTH"
          fi

          if [ -z "${BACKTEST_SOURCE}" ]; then BACKTEST_SOURCE="DIRECT_REPLAY"; fi
          BACKTEST_SOURCE="$(echo "${BACKTEST_SOURCE}" | tr '[:lower:]' '[:upper:]')"
          case "${BACKTEST_SOURCE}" in
            DIRECT_REPLAY|CSV_CACHE) ;;
            *) BACKTEST_SOURCE="DIRECT_REPLAY" ;;
          esac
          if [ -z "${DIRECT_TOP_N}" ]; then DIRECT_TOP_N="150"; fi
          if [ -z "${DIRECT_LIMIT_PER_DATE}" ]; then DIRECT_LIMIT_PER_DATE="15"; fi
          if [ -z "${BACKTEST_WEEKS}" ]; then BACKTEST_WEEKS="8"; fi
          if [ -z "${BACKTEST_HOLD_DAYS}" ]; then BACKTEST_HOLD_DAYS="10"; fi
          if [ -z "${BACKTEST_STOP_PCT}" ]; then BACKTEST_STOP_PCT="-5"; fi
          if [ -z "${BACKTEST_STOP_MODE}" ]; then BACKTEST_STOP_MODE="SIGNAL_STOP_WITH_FALLBACK"; fi
          BACKTEST_STOP_MODE="$(echo "${BACKTEST_STOP_MODE}" | tr '[:lower:]' '[:upper:]')"
          case "${BACKTEST_STOP_MODE}" in
            FIXED_PCT|SIGNAL_STOP|SIGNAL_STOP_WITH_FALLBACK|BOTH_COMPARE) ;;
            *) BACKTEST_STOP_MODE="SIGNAL_STOP_WITH_FALLBACK" ;;
          esac
          if [ -z "${SIGNAL_CSV_PATH}" ]; then SIGNAL_CSV_PATH="reports/v1080_stockhunter_signals.csv"; fi
          if [ -z "${BACKTEST_OUTPUT_MODE}" ]; then BACKTEST_OUTPUT_MODE="BOTH"; fi
          BACKTEST_OUTPUT_MODE="$(echo "${BACKTEST_OUTPUT_MODE}" | tr '[:lower:]' '[:upper:]')"
          case "${BACKTEST_OUTPUT_MODE}" in
            FILE|TELEGRAM|BOTH) ;;
            *) BACKTEST_OUTPUT_MODE="BOTH" ;;
          esac

          echo "TEST_PROFILE=${PROFILE}" >> $GITHUB_ENV
          EFFECTIVE_CHAT_ID="${TEST_CHAT_OVERRIDE}"
          if [ -z "${EFFECTIVE_CHAT_ID}" ]; then
            if [ "${PROFILE}" = "REAL_FULL" ]; then
              EFFECTIVE_CHAT_ID="${STOCK_SEARCH_CHAT_ID:-${STOCKHUNTER_CHAT_ID:-${TELEGRAM_DYUL_CHAT_ID:-${TELEGRAM_CHAT_ID}}}}"
            else
              EFFECTIVE_CHAT_ID="${TELEGRAM_TEST_CHAT_ID:-${STOCK_SEARCH_CHAT_ID:-${TELEGRAM_CHAT_ID}}}"
            fi
          fi
          echo "TELEGRAM_CHAT_ID_EFFECTIVE=${EFFECTIVE_CHAT_ID}" >> $GITHUB_ENV
          echo "V1080_SIGNAL_CSV=${SIGNAL_CSV_PATH}" >> $GITHUB_ENV
          echo "V1081_BACKTEST_SOURCE=${BACKTEST_SOURCE}" >> $GITHUB_ENV
          echo "V1081_DIRECT_TOP_N=${DIRECT_TOP_N}" >> $GITHUB_ENV
          echo "V1081_DIRECT_LIMIT_PER_DATE=${DIRECT_LIMIT_PER_DATE}" >> $GITHUB_ENV
          echo "V1080_BACKTEST_WEEKS=${BACKTEST_WEEKS}" >> $GITHUB_ENV
          echo "V1080_BACKTEST_HOLD_DAYS=${BACKTEST_HOLD_DAYS}" >> $GITHUB_ENV
          echo "V1080_BACKTEST_STOP_PCT=${BACKTEST_STOP_PCT}" >> $GITHUB_ENV
          echo "V1082_BACKTEST_STOP_MODE=${BACKTEST_STOP_MODE}" >> $GITHUB_ENV
          echo "V1080_BACKTEST_OUTPUT_MODE=${BACKTEST_OUTPUT_MODE}" >> $GITHUB_ENV
          echo "V1084_DIRECT_REPORT_HOOK_FIX=1" >> $GITHUB_ENV
          echo "V1084_FORCE_QUALITY_BLOCK=1" >> $GITHUB_ENV
          echo "V1088_REAL_OUTPUT_PRIORITY_APPLY=1" >> $GITHUB_ENV
          echo "V1088_SORT_TOP15_BY_PRIORITY=1" >> $GITHUB_ENV
          echo "V1088_LABEL_TOP15_LINES=1" >> $GITHUB_ENV
          echo "V1088_LABEL_TODAY_ACTION=1" >> $GITHUB_ENV
          echo "V1088_HIDE_LIQUIDITY_AS_STRENGTH=1" >> $GITHUB_ENV
          echo "V1094_REAL_CANDIDATE_FILTER=1" >> $GITHUB_ENV
          echo "V1094_FILTER_TOP15_CANDIDATES=1" >> $GITHUB_ENV
          echo "V1094_FILTER_DIRECT_REPLAY=1" >> $GITHUB_ENV
