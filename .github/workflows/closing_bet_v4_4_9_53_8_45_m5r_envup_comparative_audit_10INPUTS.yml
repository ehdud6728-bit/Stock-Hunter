      CLOSING_BET_CP6_LIVE_TOP_N: ${{ vars.CLOSING_BET_CP6_LIVE_TOP_N || '3' }}
      CLOSING_BET_CP6_SYMBOL_AUDIT: ${{ vars.CLOSING_BET_CP6_SYMBOL_AUDIT || '1' }}
      CLOSING_BET_CP6_SYMBOL_AUDIT_CODE: ${{ vars.CLOSING_BET_CP6_SYMBOL_AUDIT_CODE || '204320' }}
      CLOSING_BET_CP6_SYMBOL_AUDIT_NAME: ${{ vars.CLOSING_BET_CP6_SYMBOL_AUDIT_NAME || 'HL만도' }}
      CLOSING_BET_CP6_SYMBOL_AUDIT_TOP_N: ${{ vars.CLOSING_BET_CP6_SYMBOL_AUDIT_TOP_N || '5' }}
      CLOSING_BET_CP6_SYMBOL_AUDIT_DATE_RESTORE: ${{ vars.CLOSING_BET_CP6_SYMBOL_AUDIT_DATE_RESTORE || '1' }}
      CLOSING_BET_CP6_SYMBOL_AUDIT_DATE_SOURCE: ${{ vars.CLOSING_BET_CP6_SYMBOL_AUDIT_DATE_SOURCE || 'auto' }}
      CLOSING_BET_H_CORE_PROMOTION_AUDIT: '1'
      CLOSING_BET_H_FAST_TIMING_AUDIT: '1'
      CLOSING_BET_I_LEADER_LIFECYCLE_LABEL: '1'
      CLOSING_BET_LIVE_TRACKING_LOG: '1'
      CLOSING_BET_LIVE_PROMOTION_MIN_N: '10'
      CLOSING_BET_SHOW_EMPTY_LIVE_SECTIONS: '1'
      CLOSING_BET_FAST_LIVE_MODE: '0'
      CLOSING_BET_SHOW_SLOCK_LIVE: '0'
      I_CORE_MAIN_ONLY: '1'
      CLOSING_BET_MAX_WORKERS: '12'
      CLOSING_BET_BACKTEST_WORKERS: '8'
      CLOSING_BET_LOG_DIR: closing_bet_logs
      CLOSING_BET_SCAN_UNIVERSE: hybrid_union
      CLOSING_BET_ALLOW_UNIVERSE_FALLBACK: '1'
      CLOSING_BET_STATIC_CORE_MAX: '260'
      CLOSING_BET_US_SECTOR_AUTO_FETCH: '1'
      CLOSING_BET_US_SECTOR_EVAL_ACTIVE: '1'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install pandas numpy requests finance-datareader beautifulsoup4 lxml pytz python-dateutil openpyxl
          if [ -n "${PYKRX_VERSION:-}" ]; then
            echo "Installing pinned pykrx==${PYKRX_VERSION}"
            pip install "pykrx==${PYKRX_VERSION}"
          else
            echo "Installing latest pykrx"
            pip install pykrx
          fi
          python - <<'FDR_CHECK'
          import FinanceDataReader as fdr
          print("FinanceDataReader import OK")
          FDR_CHECK
          python - <<'PYKRX_CHECK'
          import os
          def state(name):
              v = str(os.environ.get(name, '') or '').strip()
              return 'SET' if v else 'EMPTY'
          print('KRX_ENV_ALIAS_STATE =', {
              'KRX_DATA_ID': state('KRX_DATA_ID'),
              'KRX_ID': state('KRX_ID'),
              'KRX_USER_ID': state('KRX_USER_ID'),
              'KRX_DATA_PW': state('KRX_DATA_PW'),
              'KRX_PW': state('KRX_PW'),
              'KRX_PASSWORD': state('KRX_PASSWORD'),
              'PYKRX_VERSION': os.environ.get('PYKRX_VERSION', '') or 'latest',
          })
          try:
              from pykrx import stock as pykrx_stock
              print('pykrx import OK')
          except BaseException as e:
              print(f'⚠️ pykrx import warning: {type(e).__name__}: {e}')
              print('Continue with scanner fallback / degraded data mode.')
          PYKRX_CHECK

      - name: Prepare KRX flow cache directory
        run: mkdir -p closing_bet_logs

      - name: Restore KRX flow cache
        uses: actions/cache@v4
        with:
          path: closing_bet_logs
          key: krx-flow-cache-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            krx-flow-cache-${{ github.ref_name }}-
            krx-flow-cache-

      - name: Verify Telegram route for Closing Bet
        run: |
          python - <<'PY'
          import os
          import requests

          def state(name):
              v = os.environ.get(name, '')
              if not v:
                  return 'EMPTY'
              return f'SET(len={len(v)})'

          def split_ids(v):
              return [c.strip() for c in str(v or '').split(',') if c.strip()]

          def add_pair(pairs, token_name, token, chat_name, chats):
              token = str(token or '').strip()
              if not token:
                  return
              for chat_id in split_ids(chats):
                  key = (token, chat_id)
                  if key not in seen:
                      seen.add(key)
                      pairs.append((token_name, token, chat_name, chat_id))

          def mask_chat(chat_id):
              c = str(chat_id or '').strip()
              if len(c) <= 6:
                  return '*' * len(c)
              return c[:3] + '***' + c[-3:]

          def write_env(name, value):
              with open(os.environ['GITHUB_ENV'], 'a', encoding='utf-8') as f:
                  f.write(f'{name}={value}\n')

          print('CLOSING_BET_TOKEN    =', state('CLOSING_BET_TOKEN'))
          print('CLOSING_BET_CHAT_ID  =', state('CLOSING_BET_CHAT_ID'))
          print('CLOSING_BET_CHAT_SRC =', os.environ.get('CLOSING_BET_CHAT_ID_SOURCE', 'EMPTY'))
          print('TELEGRAM_TOKEN       =', state('TELEGRAM_TOKEN'))
          print('TELEGRAM_LEGACY_TOKEN=', state('TELEGRAM_LEGACY_TOKEN'))
          print('TELEGRAM_CHAT_ID     =', state('TELEGRAM_CHAT_ID'))
          print('TELEGRAM_DYUL_CHAT_ID=', state('TELEGRAM_DYUL_CHAT_ID'))

          send_flag = str(os.environ.get('INPUT_SEND_TELEGRAM', 'true') or 'true').lower()
          if send_flag not in ('1', 'true', 'yes', 'y', 'on'):
              print('TELEGRAM_ROUTE_CHECK = SKIP(send_telegram=false)')
              raise SystemExit(0)

          candidate_chats_primary = os.environ.get('CLOSING_BET_CHAT_ID', '')
          candidate_chats_legacy = os.environ.get('TELEGRAM_DYUL_CHAT_ID', '')
          candidate_chats_default = os.environ.get('TELEGRAM_DEFAULT_CHAT_ID_RAW', '')

          seen = set()
          pairs = []
          # v53.7.2: token/chat을 따로 고르지 말고, 실제 getChat이 성공하는 pair를 고른다.
          # 1) manual/closebet chat + closebet token
          add_pair(pairs, 'CLOSING_BET_TOKEN', os.environ.get('CLOSING_BET_TOKEN'), 'CLOSING_BET_CHAT_ID', candidate_chats_primary)
          add_pair(pairs, 'TELEGRAM_CLOSEBET_TOKEN', os.environ.get('TELEGRAM_CLOSEBET_TOKEN'), 'CLOSING_BET_CHAT_ID', candidate_chats_primary)
          # 2) same chat + legacy/default token. 과거 TELEGRAM_DYUL_CHAT_ID가 TELEGRAM_TOKEN bot 방이던 경우 복구.
          add_pair(pairs, 'TELEGRAM_LEGACY_TOKEN', os.environ.get('TELEGRAM_LEGACY_TOKEN'), 'CLOSING_BET_CHAT_ID', candidate_chats_primary)
          add_pair(pairs, 'TELEGRAM_TOKEN', os.environ.get('TELEGRAM_TOKEN'), 'CLOSING_BET_CHAT_ID', candidate_chats_primary)
          # 3) explicit legacy DYUL chat pair. 전용방 alias로 인정하되 getChat 성공 시에만 사용.
          add_pair(pairs, 'TELEGRAM_LEGACY_TOKEN', os.environ.get('TELEGRAM_LEGACY_TOKEN'), 'TELEGRAM_DYUL_CHAT_ID', candidate_chats_legacy)
          add_pair(pairs, 'TELEGRAM_TOKEN', os.environ.get('TELEGRAM_TOKEN'), 'TELEGRAM_DYUL_CHAT_ID', candidate_chats_legacy)
          add_pair(pairs, 'CLOSING_BET_TOKEN', os.environ.get('CLOSING_BET_TOKEN'), 'TELEGRAM_DYUL_CHAT_ID', candidate_chats_legacy)
          # 4) 마지막 진단용. 기본방 fallback은 금지 원칙이므로 source에 DEFAULT_DIAG_ONLY를 명확히 표시.
          add_pair(pairs, 'TELEGRAM_LEGACY_TOKEN', os.environ.get('TELEGRAM_LEGACY_TOKEN'), 'TELEGRAM_CHAT_ID_DEFAULT_DIAG_ONLY', candidate_chats_default)

          if not pairs:
              raise SystemExit('TELEGRAM ROUTE INVALID: no token/chat candidates. Set TELEGRAM_CLOSEBET_TOKEN + TELEGRAM_CLOSEBET_CHAT_ID, or workflow input closing_bet_chat_id_manual.')

          failures = []
          selected = None
          for token_name, token, chat_name, chat_id in pairs:
              try:
                  r = requests.get(f'https://api.telegram.org/bot{token}/getChat', params={'chat_id': chat_id}, timeout=8)
                  if r.status_code < 400:
                      selected = (token_name, token, chat_name, chat_id)
                      break
                  failures.append(f'{token_name}+{chat_name}:{r.status_code}:{(r.text or "")[:90]}')
              except Exception as e:
                  failures.append(f'{token_name}+{chat_name}:{type(e).__name__}:{str(e)[:90]}')

          if selected is None:
              print('TELEGRAM_ROUTE_CANDIDATES_FAILED =')
              for f in failures[:8]:
                  print(' -', f)
              raise SystemExit('TELEGRAM ROUTE INVALID: no valid TOKEN/CHAT_ID pair. Check bot invite, -100 prefix, stale TELEGRAM_DYUL_CHAT_ID, or mismatched closebet/default bot token.')

          token_name, token, chat_name, chat_id = selected
          pair_source = f'validated:{token_name}+{chat_name}'
          print('TELEGRAM_ROUTE_CHECK = PASS | pair=' + pair_source + ' | chat=' + mask_chat(chat_id))
          write_env('CLOSING_BET_TOKEN', token)
          write_env('TELEGRAM_TOKEN', token)
          write_env('CLOSING_BET_CHAT_ID', chat_id)
          write_env('TELEGRAM_CHAT_ID', chat_id)
          write_env('CLOSING_BET_CHAT_ID_SOURCE', pair_source)
          write_env('TELEGRAM_ROUTE_PAIR_SOURCE', pair_source)
          PY

      - name: Show v4.4.9.53.8.5 files
        run: |
          echo "Python file check"
          ls -la Closing_bet_scanner_v2.py
          python -m py_compile Closing_bet_scanner_v2.py

      - name: Decide v4.4.9.53.8.5 run mode
        shell: bash
        run: |
          ACTION_RAW="${{ inputs.action_mode || '' }}"
          ACTION="${ACTION_RAW%%__*}"
          RUN_MODE="main"

          if [ "${{ github.event_name }}" = "schedule" ] && [ "${{ github.event.schedule }}" = "03 06 * * 1-5" ]; then
            RUN_MODE="final_kick"
          fi

          if [ "$ACTION" = "final_kick" ]; then
            RUN_MODE="final_kick"
          fi

          if [ "$RUN_MODE" = "final_kick" ]; then
            echo "CLOSING_BET_RUN_MODE=final_kick" >> "$GITHUB_ENV"
            echo "CLOSING_BET_FINAL_KICK_ONLY=1" >> "$GITHUB_ENV"
            echo "CLOSING_BET_MAX_FINAL_KICK_CARDS=3" >> "$GITHUB_ENV"
            echo "CLOSING_BET_WORKER_MODE=1" >> "$GITHUB_ENV"
            echo "CLOSING_BET_SHOW_RISK_DETAILS=0" >> "$GITHUB_ENV"
            echo "CLOSING_BET_SHOW_LEGACY_SECTIONS=0" >> "$GITHUB_ENV"
            echo "CLOSING_BET_SHOW_C_DIAG=0" >> "$GITHUB_ENV"
            echo "CLOSING_BET_SHOW_H_DIAG=0" >> "$GITHUB_ENV"
            echo "CLOSING_BET_TELEGRAM_MAX_LEN=3000" >> "$GITHUB_ENV"
            echo "CLOSING_BET_FINAL_KICK_COMPACT=1" >> "$GITHUB_ENV"
          else
            echo "CLOSING_BET_RUN_MODE=main" >> "$GITHUB_ENV"
            echo "CLOSING_BET_FINAL_KICK_ONLY=0" >> "$GITHUB_ENV"
          fi

          echo "RUN_MODE=$RUN_MODE"

      - name: Run v4.4.9.53.8.5 scanner/backtest
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p closing_bet_logs

          ACTION_RAW="${{ inputs.action_mode || '' }}"
          ACTION="${ACTION_RAW%%__*}"
          STRATEGY_RAW="${{ inputs.strategy_only || 'none__전체/일반실행' }}"
          STRATEGY="${STRATEGY_RAW%%__*}"

          FLAGS=""
          if [ "${{ github.event_name }}" = "schedule" ]; then
            FLAGS="$FLAGS --force"
          else
            FLAGS="$FLAGS --force"
          fi

          STRAT_FLAGS=""
          case "$STRATEGY" in
            none) STRAT_FLAGS="" ;;
            i_core) STRAT_FLAGS="--backtest-i-core-only" ;;
            leader_gap) STRAT_FLAGS="--backtest-leader-gap-only" ;;
            h_watch) STRAT_FLAGS="--backtest-h-watch-only" ;;
            h) STRAT_FLAGS="--backtest-h-only" ;;
            g) STRAT_FLAGS="--backtest-g-only" ;;
            c_pullback) STRAT_FLAGS="--backtest-c-pullback-only" ;;
            c_strict) STRAT_FLAGS="--backtest-c-strict-only" ;;
            c_swing) STRAT_FLAGS="--backtest-c-swing-only" ;;
            c) STRAT_FLAGS="--backtest-c-only" ;;
            safe) STRAT_FLAGS="--backtest-safe-only" ;;
            neutral) STRAT_FLAGS="--backtest-neutral-only" ;;
            risk) STRAT_FLAGS="--backtest-risk-only" ;;
            core) STRAT_FLAGS="--backtest-core-only" ;;
            *) STRAT_FLAGS="" ;;
          esac

          if [ "$ACTION" = "backtest" ]; then
            BT_FLAGS="--backtest-hold-days ${{ inputs.hold_days || '60' }} --backtest-min-eval-days ${{ inputs.backtest_min_eval_days || '3' }} --backtest-top-per-strategy 5 $STRAT_FLAGS"
            if [ -n "${{ inputs.backtest_start || '' }}" ] || [ -n "${{ inputs.backtest_end || '' }}" ]; then
              [ -n "${{ inputs.backtest_start || '' }}" ] && BT_FLAGS="$BT_FLAGS --backtest-start ${{ inputs.backtest_start }}"
              [ -n "${{ inputs.backtest_end || '' }}" ] && BT_FLAGS="$BT_FLAGS --backtest-end ${{ inputs.backtest_end }}"
            else
              BT_FLAGS="$BT_FLAGS --backtest-months ${{ inputs.backtest_months || '18' }}"
            fi
            if [ "${{ inputs.all_candidates || 'true' }}" = "true" ]; then
              BT_FLAGS="$BT_FLAGS --backtest-all-candidates"
            fi
            if [ "${{ inputs.send_telegram || 'true' }}" = "true" ]; then
              BT_FLAGS="$BT_FLAGS --send-backtest-summary"
            fi
            echo "RUN v4.4.9.53.8.43: python Closing_bet_scanner_v2.py $BT_FLAGS $FLAGS --compact-summary"
            python Closing_bet_scanner_v2.py $BT_FLAGS $FLAGS --compact-summary
          elif [ "$ACTION" = "eval" ]; then
            EXTRA="--eval-pending"
            if [ "${{ inputs.send_telegram || 'true' }}" = "true" ]; then EXTRA="$EXTRA --send-summary"; fi
            python Closing_bet_scanner_v2.py $EXTRA $FLAGS --compact-summary
          elif [ "$ACTION" = "summary" ]; then
            EXTRA="--summary"
            if [ "${{ inputs.send_telegram || 'true' }}" = "true" ]; then EXTRA="$EXTRA --send-summary"; fi
            python Closing_bet_scanner_v2.py $EXTRA $FLAGS --compact-summary
          elif [ "$ACTION" = "final_kick" ]; then
            python Closing_bet_scanner_v2.py $FLAGS --compact-summary
          else
            python Closing_bet_scanner_v2.py $FLAGS --compact-summary
          fi
