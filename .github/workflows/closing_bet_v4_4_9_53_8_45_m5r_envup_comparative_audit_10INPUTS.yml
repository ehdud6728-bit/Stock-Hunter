      # v53.8.32: KRX credentials alias matrix + data mode live final. 기존 정상버전과 기본명은 같지만, Secret 이름이 달라도 받도록 확장.
      KRX_DATA_ID: ${{ secrets.KRX_DATA_ID || secrets.KRX_ID || secrets.KRX_USER_ID || secrets.KRX_USERNAME || secrets.KRX_LOGIN_ID || vars.KRX_DATA_ID || vars.KRX_ID || vars.KRX_USER_ID || vars.KRX_USERNAME || vars.KRX_LOGIN_ID }}
      KRX_DATA_PW: ${{ secrets.KRX_DATA_PW || secrets.KRX_PW || secrets.KRX_PASSWORD || secrets.KRX_PASS || secrets.KRX_LOGIN_PW || secrets.KRX_LOGIN_PASSWORD || vars.KRX_DATA_PW || vars.KRX_PW || vars.KRX_PASSWORD || vars.KRX_PASS || vars.KRX_LOGIN_PW || vars.KRX_LOGIN_PASSWORD }}
      KRX_ID: ${{ secrets.KRX_ID || secrets.KRX_DATA_ID || secrets.KRX_USER_ID || secrets.KRX_USERNAME || secrets.KRX_LOGIN_ID || vars.KRX_ID || vars.KRX_DATA_ID || vars.KRX_USER_ID || vars.KRX_USERNAME || vars.KRX_LOGIN_ID }}
      KRX_PW: ${{ secrets.KRX_PW || secrets.KRX_DATA_PW || secrets.KRX_PASSWORD || secrets.KRX_PASS || secrets.KRX_LOGIN_PW || secrets.KRX_LOGIN_PASSWORD || vars.KRX_PW || vars.KRX_DATA_PW || vars.KRX_PASSWORD || vars.KRX_PASS || vars.KRX_LOGIN_PW || vars.KRX_LOGIN_PASSWORD }}
      KRX_USER_ID: ${{ secrets.KRX_USER_ID || secrets.KRX_ID || secrets.KRX_DATA_ID || vars.KRX_USER_ID || vars.KRX_ID || vars.KRX_DATA_ID }}
      KRX_PASSWORD: ${{ secrets.KRX_PASSWORD || secrets.KRX_PW || secrets.KRX_DATA_PW || vars.KRX_PASSWORD || vars.KRX_PW || vars.KRX_DATA_PW }}
      PYKRX_VERSION: ${{ vars.PYKRX_VERSION || '' }}

      CLOSING_BET_COMPACT_OPERATION_SUMMARY: '1'
      CLOSING_BET_BACKTEST_REPORT_COMPACT_CORE: '1'
      CLOSING_BET_BACKTEST_REPORT_LIVE_READY: '1'
