name: closing-bet-v4-4-9-53-8-45-m5r-envup-comparative-audit-10inputs

on:
  schedule:
    # 한국시간 평일 오후 2:40 = UTC 05:40, 메인 후보 발굴
    - cron: '40 05 * * 1-5'
    # 한국시간 평일 오후 3:03 = UTC 06:03, 동시호가 직전 최종킥
    - cron: '03 06 * * 1-5'
  workflow_dispatch:
    inputs:
      action_mode:
        description: 실행 모드
        required: true
        default: backtest__성과검증
        type: choice
        options:
          - backtest__성과검증
          - live__실시간스캔
          - eval__미평가후보_평가
          - summary__검증요약
          - final_kick__동시호가_최종킥
      strategy_only:
        description: 전략 선택
        required: true
        default: none__전체/일반실행
        type: choice
        options:
          - none__전체/일반실행
          - i_core__I-MAIN_150/200일_시세분출
          - leader_gap__L-CORE_대형주_리더갭
          - h_watch__H-WATCH_신고가_눌림관찰
          - h__H-CORE_신고가거자름
          - g__G-SAFE_모랄레스갭
          - c_pullback__C_역매공파_눌림재진입
          - c_strict__C_역매공파_엄격형
          - c_swing__C_역매공파_스윙
          - c__C_역매공파_전체
          - safe__S-CORE_SAFE
          - neutral__S-CORE_NEUTRAL
          - risk__S-CORE_RISK
          - core__S-CORE_전체
      backtest_months:
        description: 백테스트 개월수, start/end 미사용 시 적용
        required: true
        default: '18'
      backtest_start:
        description: 시작일 YYYY-MM-DD, 비우면 자동
        required: false
        default: ''
      backtest_end:
        description: 종료일 YYYY-MM-DD, 비우면 자동
        required: false
        default: ''
      hold_days:
        description: 보유평가 거래일수
        required: true
        default: '60'
      backtest_min_eval_days:
        description: 부분검증 최소 미래 거래일수
        required: true
        default: '1'
      all_candidates:
        description: 전체후보 검증 여부
        required: true
        default: 'true'
        type: choice
        options: ['true', 'false']
      send_telegram:
        description: 텔레그램 전송 여부
        required: true
        default: 'true'
        type: choice
        options: ['true', 'false']
      closing_bet_chat_id_manual:
        description: 종가배팅 전용 CHAT_ID 수동입력, 비워도 됨
        required: false
        default: ''
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      TZ: Asia/Seoul
      PYTHONUNBUFFERED: '1'
      # Telegram route priority / forced close-bet room routing
      # 1) CLOSING_BET_* secrets first
      # 2) legacy CLOSE_BET_* secrets second
      # 3) default TELEGRAM_* only if close-bet secrets are empty
      # v4.4.9.4 A-RETEST material confirm route/new pattern performance: workflow 수동입력을 최우선, TELEGRAM_CLOSEBET/CLOSING_BET 전용 값을 다음, TELEGRAM_DYUL_CHAT_ID는 legacy 후순위로 사용한다.
      # chat not found 방지를 위해 어떤 source가 잡혔는지 Verify 단계에서 표시한다.
      CLOSING_BET_TOKEN: ${{ secrets.TELEGRAM_CLOSEBET_TOKEN || secrets.TELEGRAM_CLOSE_BET_TOKEN || secrets.CLOSING_BET_TOKEN || secrets.CLOSE_BET_TOKEN || secrets.CLOSING_BET_TELEGRAM_TOKEN || secrets.CLOSE_BET_TELEGRAM_TOKEN || vars.TELEGRAM_CLOSEBET_TOKEN || vars.TELEGRAM_CLOSE_BET_TOKEN }}
      CLOSING_BET_CHAT_ID: ${{ inputs.closing_bet_chat_id_manual || secrets.TELEGRAM_CLOSEBET_CHAT_ID || secrets.TELEGRAM_CLOSE_BET_CHAT_ID || secrets.CLOSING_BET_CHAT_ID || secrets.CLOSE_BET_CHAT_ID || secrets.CLOSING_BET_TELEGRAM_CHAT_ID || secrets.CLOSE_BET_TELEGRAM_CHAT_ID || secrets.TELEGRAM_CLOSEBET_ROOM_ID || secrets.TELEGRAM_CLOSE_BET_ROOM_ID || secrets.CLOSING_BET_ROOM_ID || secrets.CLOSE_BET_ROOM_ID || vars.TELEGRAM_CLOSEBET_CHAT_ID || vars.TELEGRAM_CLOSE_BET_CHAT_ID || vars.CLOSING_BET_CHAT_ID || vars.CLOSE_BET_CHAT_ID || vars.CLOSING_BET_TELEGRAM_CHAT_ID || vars.CLOSE_BET_TELEGRAM_CHAT_ID || vars.TELEGRAM_CLOSEBET_ROOM_ID || vars.TELEGRAM_CLOSE_BET_ROOM_ID || vars.CLOSING_BET_ROOM_ID || vars.CLOSE_BET_ROOM_ID || secrets.TELEGRAM_DYUL_CHAT_ID || vars.TELEGRAM_DYUL_CHAT_ID }}
      CLOSING_BET_CHAT_ID_SOURCE: ${{ inputs.closing_bet_chat_id_manual && 'workflow_input.closing_bet_chat_id_manual' || secrets.TELEGRAM_CLOSEBET_CHAT_ID && 'secrets.TELEGRAM_CLOSEBET_CHAT_ID' || secrets.TELEGRAM_CLOSE_BET_CHAT_ID && 'secrets.TELEGRAM_CLOSE_BET_CHAT_ID' || secrets.CLOSING_BET_CHAT_ID && 'secrets.CLOSING_BET_CHAT_ID' || secrets.CLOSE_BET_CHAT_ID && 'secrets.CLOSE_BET_CHAT_ID' || secrets.CLOSING_BET_TELEGRAM_CHAT_ID && 'secrets.CLOSING_BET_TELEGRAM_CHAT_ID' || secrets.CLOSE_BET_TELEGRAM_CHAT_ID && 'secrets.CLOSE_BET_TELEGRAM_CHAT_ID' || secrets.TELEGRAM_CLOSEBET_ROOM_ID && 'secrets.TELEGRAM_CLOSEBET_ROOM_ID' || secrets.TELEGRAM_CLOSE_BET_ROOM_ID && 'secrets.TELEGRAM_CLOSE_BET_ROOM_ID' || secrets.CLOSING_BET_ROOM_ID && 'secrets.CLOSING_BET_ROOM_ID' || secrets.CLOSE_BET_ROOM_ID && 'secrets.CLOSE_BET_ROOM_ID' || vars.TELEGRAM_CLOSEBET_CHAT_ID && 'vars.TELEGRAM_CLOSEBET_CHAT_ID' || vars.TELEGRAM_CLOSE_BET_CHAT_ID && 'vars.TELEGRAM_CLOSE_BET_CHAT_ID' || vars.CLOSING_BET_CHAT_ID && 'vars.CLOSING_BET_CHAT_ID' || vars.CLOSE_BET_CHAT_ID && 'vars.CLOSE_BET_CHAT_ID' || vars.CLOSING_BET_TELEGRAM_CHAT_ID && 'vars.CLOSING_BET_TELEGRAM_CHAT_ID' || vars.CLOSE_BET_TELEGRAM_CHAT_ID && 'vars.CLOSE_BET_TELEGRAM_CHAT_ID' || vars.TELEGRAM_CLOSEBET_ROOM_ID && 'vars.TELEGRAM_CLOSEBET_ROOM_ID' || vars.TELEGRAM_CLOSE_BET_ROOM_ID && 'vars.TELEGRAM_CLOSE_BET_ROOM_ID' || vars.CLOSING_BET_ROOM_ID && 'vars.CLOSING_BET_ROOM_ID' || vars.CLOSE_BET_ROOM_ID && 'vars.CLOSE_BET_ROOM_ID' || secrets.TELEGRAM_DYUL_CHAT_ID && 'secrets.TELEGRAM_DYUL_CHAT_ID_LEGACY_LAST' || vars.TELEGRAM_DYUL_CHAT_ID && 'vars.TELEGRAM_DYUL_CHAT_ID_LEGACY_LAST' || 'EMPTY' }}
      CLOSING_BET_REQUIRE_DEDICATED_CHAT: '1'
      INPUT_SEND_TELEGRAM: ${{ inputs.send_telegram || 'true' }}
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_CLOSEBET_TOKEN || secrets.TELEGRAM_CLOSE_BET_TOKEN || secrets.CLOSING_BET_TOKEN || secrets.CLOSE_BET_TOKEN || secrets.CLOSING_BET_TELEGRAM_TOKEN || secrets.CLOSE_BET_TELEGRAM_TOKEN || vars.TELEGRAM_CLOSEBET_TOKEN || vars.TELEGRAM_CLOSE_BET_TOKEN || secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ inputs.closing_bet_chat_id_manual || secrets.TELEGRAM_CLOSEBET_CHAT_ID || secrets.TELEGRAM_CLOSE_BET_CHAT_ID || secrets.CLOSING_BET_CHAT_ID || secrets.CLOSE_BET_CHAT_ID || secrets.CLOSING_BET_TELEGRAM_CHAT_ID || secrets.CLOSE_BET_TELEGRAM_CHAT_ID || secrets.TELEGRAM_CLOSEBET_ROOM_ID || secrets.TELEGRAM_CLOSE_BET_ROOM_ID || secrets.CLOSING_BET_ROOM_ID || secrets.CLOSE_BET_ROOM_ID || vars.TELEGRAM_CLOSEBET_CHAT_ID || vars.TELEGRAM_CLOSE_BET_CHAT_ID || vars.CLOSING_BET_CHAT_ID || vars.CLOSE_BET_CHAT_ID || vars.CLOSING_BET_TELEGRAM_CHAT_ID || vars.CLOSE_BET_TELEGRAM_CHAT_ID || vars.TELEGRAM_CLOSEBET_ROOM_ID || vars.TELEGRAM_CLOSE_BET_ROOM_ID || vars.CLOSING_BET_ROOM_ID || vars.CLOSE_BET_ROOM_ID || secrets.TELEGRAM_DYUL_CHAT_ID || vars.TELEGRAM_DYUL_CHAT_ID }}
      TELEGRAM_CLOSEBET_TOKEN: ${{ secrets.TELEGRAM_CLOSEBET_TOKEN || secrets.TELEGRAM_CLOSE_BET_TOKEN || vars.TELEGRAM_CLOSEBET_TOKEN || vars.TELEGRAM_CLOSE_BET_TOKEN }}
      TELEGRAM_DYUL_CHAT_ID: ${{ secrets.TELEGRAM_DYUL_CHAT_ID || vars.TELEGRAM_DYUL_CHAT_ID }}
      # v53.7.2 pair resolver용 raw fallback. TELEGRAM_TOKEN이 closebet token으로 덮여도 legacy token을 별도 보존한다.
      TELEGRAM_LEGACY_TOKEN: ${{ secrets.TELEGRAM_TOKEN || vars.TELEGRAM_TOKEN }}
      TELEGRAM_DEFAULT_CHAT_ID_RAW: ${{ secrets.TELEGRAM_CHAT_ID || vars.TELEGRAM_CHAT_ID }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
