
name: 🚨 급등 스캐너

on:
  schedule:
    - cron: '*/10 0-6 * * 1-5'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
            - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          pip install pandas
          pip install requests beautifulsoup4 pytz scipy ta
          pip install finance-datareader pykrx mplfinance
          pip install openai google-generativeai
          pip install gspread gspread-formatting gspread-dataframe google-auth oauth2client
          pip install -r requirements.txt
      - name: 실행
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python surge_scanner.py &
          python presurge_scanner.py
          wait