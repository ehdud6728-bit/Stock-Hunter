name: TOPDOWN V1107.2 Backtest

on:
  workflow_dispatch:
    inputs:
      send_telegram:
        description: '텔레그램 전송 여부'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      topdown_weeks:
        description: '검증 주차 수'
        required: true
        default: '52'
      universe_top:
        description: '거래대금/시총 상위 유니버스 수'
        required: true
        default: '150'
      ref_dates:
        description: '기준일 직접 지정, 콤마 구분. 비우면 최근 금요일 기준 자동'
        required: false
        default: ''

jobs:
  topdown-v1107-2-backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      TELEGRAM_BACKTEST_TOKEN: ${{ secrets.TELEGRAM_BACKTEST_TOKEN }}
      TELEGRAM_BACKTEST_CHAT_ID: ${{ secrets.TELEGRAM_BACKTEST_CHAT_ID }}
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TOPDOWN_WEEKS: ${{ github.event.inputs.topdown_weeks }}
      TOPDOWN_UNIVERSE_TOP: ${{ github.event.inputs.universe_top }}
      TOPDOWN_REF_DATES: ${{ github.event.inputs.ref_dates }}
      TOPDOWN_OUT_DIR: topdown_v1107_2_logs

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install             "numpy==1.26.4"             "pandas==2.2.3"             "requests==2.32.3"             "finance-datareader"             "pytz"             "lxml"             "html5lib"             "beautifulsoup4"
          python - <<'PY'
          import FinanceDataReader as fdr
          import pandas as pd
          import numpy as np
          import requests
          print('✅ dependency check OK', fdr.__version__, pd.__version__, np.__version__, requests.__version__)
          PY

      - name: Run TOPDOWN V1107.2 backtest
        run: |
          if [ "${{ github.event.inputs.send_telegram }}" = "true" ]; then
            python topdown_v1107_2_backtest.py --send-telegram
          else
            python topdown_v1107_2_backtest.py
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: topdown-v1107-2-logs
          path: topdown_v1107_2_logs
