name: 🕯️ 종가배팅 스캐너

on:
  schedule:
    # KST 14:50, 15:00, 15:10, 15:20 (UTC 05:50, 06:00, 06:10, 06:20)
    - cron: '50 5 * * 1-5'   # KST 14:50
    - cron: '0  6 * * 1-5'   # KST 15:00  ← 핵심
    - cron: '10 6 * * 1-5'   # KST 15:10
    - cron: '20 6 * * 1-5'   # KST 15:20

  workflow_dispatch:
    inputs:
      force:
        description: '강제 실행 (시간 무관 테스트)'
        required: false
        default: 'true'

jobs:
  closing-bet:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: 🐍 Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 의존성 설치
        run: |
          pip install --upgrade pip
          pip install pandas numpy yfinance pykrx finance-datareader beautifulsoup4 requests mplfinance ta openai anthropic gspread oauth2client scipy feedparser \
                      

      - name: 🕯️ 종가배팅 스캔
        env:
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_DYUL_CHAT_ID }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
          GOOGLE_JSON_KEY:   ${{ secrets.GOOGLE_JSON_KEY }}
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            python Closing_bet_scanner_v2.py --force
          else
            python Closing_bet_scanner_v2.py
          fi
