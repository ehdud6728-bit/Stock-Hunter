name: V1107 Topdown Backtest

on:
  workflow_dispatch:
    inputs:
      weeks:
        description: "최근 몇 주를 검증할지"
        required: true
        default: "8"
      universe_top:
        description: "거래대금/시총 상위 유니버스 수"
        required: true
        default: "150"
      ref_dates:
        description: "기준일 직접 지정, 쉼표구분. 비우면 최근 금요일 기준"
        required: false
        default: ""
      send_telegram:
        description: "텔레그램 전송 여부"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  topdown-backtest:
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BACKTEST_TOKEN: ${{ secrets.TELEGRAM_BACKTEST_TOKEN }}
      TELEGRAM_BACKTEST_CHAT_ID: ${{ secrets.TELEGRAM_BACKTEST_CHAT_ID }}
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TOPDOWN_WEEKS: ${{ inputs.weeks }}
      TOPDOWN_UNIVERSE_TOP: ${{ inputs.universe_top }}
      TOPDOWN_REF_DATES: ${{ inputs.ref_dates }}
      TOPDOWN_OUT_DIR: topdown_v1107_logs

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests finance-datareader pykrx

      - name: Run V1107 topdown backtest
        run: |
          if [ "${{ inputs.send_telegram }}" = "true" ]; then
            python topdown_v1107_backtest.py --send-telegram
          else
            python topdown_v1107_backtest.py
          fi

      - name: Upload V1107 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: topdown_v1107_logs
          path: topdown_v1107_logs
