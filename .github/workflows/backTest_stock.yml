name: BackTest Stock Scanner

on:
  workflow_dispatch:

jobs:
  build:
    timeout-minutes: 180
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          pip install pandas
          pip install requests beautifulsoup4 pytz scipy ta
          pip install finance-datareader pykrx mplfinance
          pip install openai google-generativeai
          pip install gspread gspread-formatting gspread-dataframe google-auth oauth2client
          pip install -r requirements.txt

      - name: Run Scanner
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GOOGLE_JSON_KEY: ${{ secrets.GOOGLE_JSON_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SCAN_LOG_LEVEL: QUIET
          
        run: python backtest_validator.py --start 2026-01-03 --end 2026-03-27
