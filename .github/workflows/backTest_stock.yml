name: BackTest Stock Scanner

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "백테스트 시작일 (YYYY-MM-DD)"
        required: true
        default: "2026-01-03"
        type: string
      end_date:
        description: "백테스트 종료일 (YYYY-MM-DD)"
        required: true
        default: "2026-03-27"
        type: string
      extra_args:
        description: "추가 실행 인자 (선택)"
        required: false
        default: ""
        type: string

jobs:
  build:
    timeout-minutes: 180
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          pip install pandas
          pip install requests beautifulsoup4 pytz scipy ta
          pip install finance-datareader pykrx mplfinance
          pip install openai google-generativeai
          pip install gspread gspread-formatting gspread-dataframe google-auth oauth2client
          pip install -r requirements.txt

      - name: Validate input dates
        shell: bash
        run: |
          python - <<'PY'
          from datetime import datetime
          start = "${{ inputs.start_date }}"
          end = "${{ inputs.end_date }}"
          try:
              s = datetime.strptime(start, "%Y-%m-%d")
              e = datetime.strptime(end, "%Y-%m-%d")
          except ValueError as exc:
              raise SystemExit(f"날짜 형식 오류: {exc}")
          if s > e:
              raise SystemExit("start_date는 end_date보다 늦을 수 없습니다.")
          print(f"OK: {start} ~ {end}")
          PY

      - name: Run Scanner
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GOOGLE_JSON_KEY: ${{ secrets.GOOGLE_JSON_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SCAN_LOG_LEVEL: QUIET
        shell: bash
        run: |
          EXTRA_ARGS="${{ inputs.extra_args }}"
          echo "Running backtest from ${{ inputs.start_date }} to ${{ inputs.end_date }}"
          python backtest_validator.py \
            --start "${{ inputs.start_date }}" \
            --end "${{ inputs.end_date }}" \
            ${EXTRA_ARGS}
